<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>若手教員の相談・授業サポート｜元小学校教諭が対応｜オンライン可｜まるのおうち</title>

<meta name="description" content="若手教員の授業・学級経営・人間関係の悩みをサポート。元小学校教諭がオンラインで丁寧に相談対応します。授業がうまくいかない、クラスが落ち着かないなど一人で抱え込まないためのサポートです。">

<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* 基本設定 */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#eaf4ff;
  background-image:radial-gradient(#d2e7ff 1.5px, transparent 1.5px);
  background-size:34px 34px;
  font-family:'Zen Maru Gothic',sans-serif;
  color:#444;
  line-height:1.8;
  padding:20px;
}

.main{
  max-width:1000px;
  margin:auto;
  background:#fff;
  border-radius:40px;
  padding:50px 35px;
  box-shadow:0 10px 40px rgba(100,140,200,0.15);
  overflow: hidden;
}

/* 上部ナビ */
.top-link{
  text-align:right;
  margin-bottom:10px;
}

.top-link a{
  font-size:0.85rem;
  color:#2c5aa0;
  text-decoration:none;
  border-bottom:1px solid #b8d7ff;
}

/* HEROセクション */
.hero{text-align:center;margin-bottom:60px;}

.header-flex{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:40px;
  margin-bottom:25px;
}

.logo{width:140px;}

.mini-slider{
  width:240px;
  height:240px;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  border:6px solid #b8d7ff;
  background:#fff;
}

.mini-slide{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transition:opacity 1s;
  background:#fff;
}

.mini-slide.active{opacity:1; z-index: 2;}

.mini-bubble{
  font-family:'Yomogi',cursive;
  font-size:1.1rem;
  color:#2c5aa0;
  margin-top:10px;
}

.badge{
  display:inline-block;
  background:#b8d7ff;
  color:#2c5aa0;
  padding:6px 16px;
  border-radius:999px;
  font-size:.85rem;
  margin-bottom:15px;
  font-weight:700;
}

/* タイトル設定 */
.hero h1 {
  font-size: 2.2rem;
  color: #2c5aa0;
  margin-bottom: 20px;
  line-height: 1.4;
  white-space: nowrap; 
}

.hero h1 span.sub-name {
  display: block; 
  font-size: 2.2rem;
}

/* メッセージ設定 */
.hero-message {
  font-family: 'Yomogi', cursive;
  font-size: 1.25rem;
  color: #2c5aa0;
  text-align: center;
  line-height: 1.8;
  margin-top: 10px;
  margin-bottom: 25px;
}

.hero-message span {
  display: block; 
  white-space: nowrap; 
}

.cta-btn{
  display:inline-block;
  background:#2c5aa0;
  color:#fff;
  padding:18px 45px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
  margin-top:10px;
  box-shadow: 0 4px 15px rgba(44,90,160,0.3);
  transition: 0.3s;
}

.cta-btn:hover{
  transform: translateY(-3px);
  background:#3a75c4;
}

/* 共通セクション */
section{margin-bottom:55px;}

.title{
  font-size:1.5rem;
  border-left:8px solid #b8d7ff;
  padding-left:15px;
  margin-bottom:20px;
  color:#2c5aa0;
}

.content-narrow{
  max-width:750px;
  margin:0 auto;
}

/* プロフィール */
.profile-box{
  background: #fff;
  border: 2px solid #d8e9ff;
  padding: 30px;
  border-radius: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.profile-box:hover {
  background: #fcfdff;
}

.profile-img{
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 4px solid #b8d7ff;
}

.profile-name{
  font-weight: 700;
  color: #2c5aa0;
  font-size: 1.2rem;
  margin-bottom: 10px;
}

.profile-intro {
  color: #666;
  font-size: 0.95rem;
  margin-bottom: 10px;
}

.profile-toggle-btn {
  font-size: 0.85rem;
  color: #2c5aa0;
  background: #eaf4ff;
  padding: 5px 15px;
  border-radius: 999px;
  margin-bottom: 10px;
}

.profile-content {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 0.5s ease;
  text-align: left;
}

.profile-box.active .profile-content {
  max-height: 1000px;
  opacity: 1;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px dashed #b8d7ff;
}

.profile-text{
  display: inline-block;
  font-size: 0.95rem;
  line-height: 2;
  color: #555;
}

/* お悩みリスト */
.trouble{
  background:#f5faff;
  border-radius:30px;
  padding:30px;
}

.trouble ul{list-style:none;}

.trouble li{
  padding-left:1.8em;
  position:relative;
  margin-bottom: 15px;
}

.trouble li::before{
  content:"✔";
  position:absolute;
  left:0;
  color: #2c5aa0;
}

/* メニュー */
.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.card{
  background:#f7fbff;
  border:2px solid #d8e9ff;
  border-radius:25px;
  padding:25px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{background:#fff;}

.card.active{
  transform:scale(1.02);
  box-shadow:0 15px 30px rgba(100,140,200,0.2);
  border-color: #2c5aa0;
}

.card h3{
  color: #2c5aa0;
  margin-bottom: 5px;
}

.card .price{
  font-weight: 700;
  color: #e67e22;
  font-size: 1.1rem;
}

.card-detail{
  margin-top:15px;
  line-height:1.9;
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.3s;
  font-size: 0.95rem;
  color: #555;
}

.card.active .card-detail{
  max-height:400px;
  opacity:1;
}

.info-note{
  font-size: 0.85rem;
  color: #777;
  text-align: center;
  margin-top: 20px;
}

/* フローティングボタン */
.floating-cta{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index: 100;
}

.floating-cta a{
  background:#2c5aa0;
  color:#fff;
  padding:16px 40px;
  border-radius:999px;
  text-decoration:none;
  font-weight: 700;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* レスポンシブ調整 */
@media(max-width:600px){
  .main { padding: 40px 20px; }
  .header-flex{flex-direction:column; gap: 20px;}
  .mini-slider{width:180px;height:180px;}

  .hero h1 { 
    font-size: 5.4vw; 
  }
  .hero h1 span.sub-name {
    font-size: 7vw;
    margin-top: 5px;
  }

  .hero-message {
    font-size: 3.6vw; 
    padding: 0;
  }

  .cards{grid-template-columns:1fr;}
  .floating-cta a{width:90vw; text-align:center; display: block;}
}
</style>
</head>
